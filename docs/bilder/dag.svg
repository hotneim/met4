<svg width="300" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Nodes -->
  <circle cx="50" cy="140" r="25" fill="white" stroke="#333" stroke-width="2"/>
  <text x="50" y="145" text-anchor="middle" font-family="serif" font-size="18" font-style="italic">x</text>
  
  <circle cx="250" cy="140" r="25" fill="white" stroke="#333" stroke-width="2"/>
  <text x="250" y="145" text-anchor="middle" font-family="serif" font-size="18" font-style="italic">y</text>
  
  <circle cx="150" cy="40" r="25" fill="white" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="150" y="45" text-anchor="middle" font-family="serif" font-size="18" font-style="italic">A</text>
  
  <!-- Arrows -->
  <!-- A to B -->
  <line x1="75" y1="140" x2="220" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- u to A -->
  <line x1="130" y1="58" x2="68" y2="118" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- u to B -->
  <line x1="170" y1="58" x2="232" y2="118" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
